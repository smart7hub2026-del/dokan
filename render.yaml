# Render: New Web Service از ریشه همین repo
# متغیرهای اجباری را در Dashboard → Environment اضافه کنید (مقادیر مخفی را اینجا ننویسید).

services:
  - type: web
    name: dokanyar-api
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npm run server:render
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        value: file:./server/prisma/dev.db
