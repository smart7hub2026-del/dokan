# اختیاری: اگر API اصلی روی Vercel است (مثلاً https://dokan.vercel.app)، این سرویس Render لازم نیست مگر برای worker/DB.
# Render: Web Service — DATABASE_URL را در Dashboard به PostgreSQL واقعی ست کنید
# (مثلاً Render Postgres، Neon، Supabase). SQLite دیگر در این پروژه استفاده نمی‌شود.
#
# عملیات پیشنهادی:
# - مهاجرت: startCommand از prisma migrate deploy (scripts/render-start.mjs) استفاده می‌کند.
# - هم‌ترازی کپی backend: بعد از تغییر migration، لوکال: npm run sync:prisma و سپس commit.
# - بکاپ: اسکریپت scripts/pg-backup.ps1؛ اعتبار dump: scripts/pg-restore-verify.ps1
# - RPO/RTO را برای تیم تعریف کنید (مثلاً RPO = فاصلهٔ cron بکاپ؛ RTO = زمان بازیابی + deploy).
# - HA چندمنطقه: در صورت نیاز replica/failover جدا از این سرویس؛ Elasticsearch فقط اگر جستجو/آنالیتیکس سنگین لازم شد.

services:
  - type: web
    name: dokanyar-api
    env: node
    plan: free
    buildCommand: npm install && npm run check:prisma-drift && npx prisma generate
    startCommand: npm run server:render
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      # DATABASE_URL را در UI اضافه کنید؛ در repo مقدار مخفی نگذارید.
      # اختیاری برای تست بازیابی از CI: TEST_DATABASE_URL (Postgres موقت)
