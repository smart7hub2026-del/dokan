# PostgreSQL لوکال — بعد از up: npm run db:migrate
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dokanyar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/postgres-init-test-db.sql:/docker-entrypoint-initdb.d/01-test-db.sql:ro

volumes:
  pgdata:
